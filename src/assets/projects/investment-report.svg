<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E9D8A6"/>
      <stop offset="0.45" stop-color="#C8A85A"/>
      <stop offset="1" stop-color="#9A7A36"/>
    </linearGradient>
    <radialGradient id="halo" cx="70%" cy="22%" r="90%">
      <stop offset="0" stop-color="rgba(200,168,90,0.22)"/>
      <stop offset="0.55" stop-color="rgba(200,168,90,0.10)"/>
      <stop offset="1" stop-color="rgba(200,168,90,0)"/>
    </radialGradient>
    <filter id="b" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="44" fill="#050608"/>
  <rect width="1200" height="800" rx="44" fill="url(#halo)"/>

  <g filter="url(#b)" opacity="0.75">
    <circle cx="950" cy="150" r="210" fill="rgba(200,168,90,0.22)"/>
    <circle cx="260" cy="210" r="170" fill="rgba(255,255,255,0.08)"/>
  </g>

  <g transform="translate(90 90)">
    <rect width="1020" height="620" rx="36" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>

    <g transform="translate(80 110)">
      <text x="0" y="0" font-family="Plus Jakarta Sans, system-ui" font-size="14" letter-spacing="6" fill="rgba(255,255,255,0.55)">INVESTMENT ANALYSIS</text>
      <text x="0" y="38" font-family="Cormorant Garamond, serif" font-size="44" font-weight="700" fill="url(#g)">Thesis + Valuation</text>
    </g>

    <g transform="translate(90 240)">
      <rect width="520" height="380" rx="28" fill="rgba(0,0,0,0.26)" stroke="rgba(255,255,255,0.10)"/>
      <g opacity="0.18" stroke="#FFFFFF" stroke-width="1">
        <path d="M50 70H470"/>
        <path d="M50 130H470"/>
        <path d="M50 190H470"/>
        <path d="M50 250H470"/>
        <path d="M50 310H470"/>
      </g>

      <path d="M60 280 C 140 150, 240 210, 320 120 S 460 170, 490 90" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
      <g fill="#E9D8A6">
        <circle cx="60" cy="280" r="5"/>
        <circle cx="160" cy="170" r="5"/>
        <circle cx="260" cy="210" r="5"/>
        <circle cx="350" cy="125" r="5"/>
        <circle cx="430" cy="160" r="5"/>
        <circle cx="490" cy="90" r="5"/>
      </g>

      <text x="50" y="46" font-family="Plus Jakarta Sans, system-ui" font-size="12" letter-spacing="6" fill="rgba(255,255,255,0.55)">PRICE ACTION</text>
    </g>

    <g transform="translate(660 240)">
      <rect width="270" height="180" rx="26" fill="rgba(0,0,0,0.26)" stroke="rgba(255,255,255,0.10)"/>
      <text x="26" y="52" font-family="Plus Jakarta Sans, system-ui" font-size="12" letter-spacing="6" fill="rgba(255,255,255,0.55)">THESIS</text>
      <text x="26" y="88" font-family="Plus Jakarta Sans, system-ui" font-size="14" fill="rgba(255,255,255,0.70)">Strong unit economics</text>
      <text x="26" y="114" font-family="Plus Jakarta Sans, system-ui" font-size="14" fill="rgba(255,255,255,0.70)">+ durable demand.</text>
      <rect x="26" y="136" width="130" height="10" rx="999" fill="rgba(200,168,90,0.55)"/>
      <rect x="26" y="136" width="210" height="10" rx="999" fill="rgba(255,255,255,0.08)"/>
    </g>

    <g transform="translate(660 440)">
      <rect width="270" height="180" rx="26" fill="rgba(0,0,0,0.26)" stroke="rgba(255,255,255,0.10)"/>
      <text x="26" y="52" font-family="Plus Jakarta Sans, system-ui" font-size="12" letter-spacing="6" fill="rgba(255,255,255,0.55)">VALUATION</text>
      <text x="26" y="88" font-family="Plus Jakarta Sans, system-ui" font-size="14" fill="rgba(255,255,255,0.70)">Comps framing</text>
      <text x="26" y="114" font-family="Plus Jakarta Sans, system-ui" font-size="14" fill="rgba(255,255,255,0.70)">with scenario ranges.</text>
      <rect x="26" y="136" width="200" height="10" rx="999" fill="rgba(200,168,90,0.55)"/>
      <rect x="26" y="136" width="210" height="10" rx="999" fill="rgba(255,255,255,0.08)"/>
    </g>
